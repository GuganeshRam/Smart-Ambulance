<!DOCTYPE html>
<html>
<head>
    <title>Select Ambulance</title>
    <style>
        body { font-family: Arial; text-align: center; }
        .btn {
            margin: 20px;
            padding: 15px;
            background: red;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Select Ambulance</h1>

<div class="btn" onclick="selectAmbulance(1)">Ambulance 1</div>
<div class="btn" onclick="selectAmbulance(2)">Ambulance 2</div>
<div class="btn" onclick="selectAmbulance(3)">Ambulance 3</div>

<script>
function selectAmbulance(id) {
    localStorage.setItem("ambulance", id);
    window.location.href = "map.html";
}
</script>

</body>
</html>
